name: gcc

on:
  push:
    tags: [ "gcc-[1-9]*.[0-9]+.[0-9]+" ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - image: ubuntu-24.04
            arch: x86_64
            ubuntu: ubuntu2404
          - image: ubuntu-24.04-arm
            arch: aarch64
            ubuntu: ubuntu2404
          - image: ubuntu-26.04
            arch: x86_64
            ubuntu: ubuntu2604
          - image: ubuntu-26.04-arm
            arch: aarch64
            ubuntu: ubuntu2604
    runs-on: ${{ matrix.image }}
    steps:
    - name: stop update man-page
      run: |
        echo "set man-db/auto-update false" | sudo debconf-communicate
        sudo dpkg-reconfigure man-db
    - name: build
      shell: bash
      run: |
        tag="${{ github.ref_name }}"
        version="${tag#gcc-}"
        suffix="-${version%%.*}"
        prefix="/opt/${tag}"
        sudo apt-get install -y libgmp-dev libmpc-dev libmpfr-dev
        curl -sSL https://gcc.gnu.org/pub/gcc/releases/${tag}/${tag}.tar.gz -o ${tag}.tar.gz
        tar xaf ${tag}.tar.gz
        rm ${tag}.tar.gz
        mkdir -p build
        pushd build
        ../${tag}/configure --prefix=${prefix} --enable-languages=c,c++ --disable-multilib --without-ppl --without-cloog-ppl --enable-checking=release --disable-nls --enable-lto --program-suffix=${suffix} LDFLAGS="-Wl,-rpath,${prefix}/lib,-rpath,${prefix}/lib64,-rpath,${prefix}/lib32"
        make -j $(nproc)
        sudo make install
        popd
        tar -C /opt -cf ./${{ matrix.ubuntu }}-${{ matrix.arch }}.tar.zst --use-compress-program="zstdmt -18" ${tag}
    - uses: actions/upload-artifact@v7
      with:
        name: archive-${{ matrix.ubuntu }}-${{ matrix.arch }}
        path: ./${{ matrix.ubuntu }}-${{ matrix.arch }}.tar.zst
  deploy:
    runs-on: ubuntu-slim
    needs: build
    permissions:
      contents: write
    steps:
    - parallel:
      - uses: actions/download-artifact@v8
        with:
          name: archive-ubuntu2404-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: archive-ubuntu2404-aarch64
      - uses: actions/download-artifact@v8
        with:
          name: archive-ubuntu2604-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: archive-ubuntu2604-aarch64
    - uses: softprops/action-gh-release@v3
      with:
        files: |
          ubuntu2404-x86_64.tar.zst
          ubuntu2404-aarch64.tar.zst
          ubuntu2604-x86_64.tar.zst
          ubuntu2604-aarch64.tar.zst
